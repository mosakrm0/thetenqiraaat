name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python - <<'PY'
          import app as app_module

          # Minimal smoke check: app imports and test client can be created.
          client = app_module.app.test_client()
          assert client is not None
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: thetenqiraaat-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start the container
        run: docker run -d --rm --name thetenqiraaat-ci -e PORT=7860 -p 7860:7860 thetenqiraaat-ci:latest

      - name: Wait for the health check
        run: |
          for _ in $(seq 1 30); do
            if ! docker ps --format '{{.Names}}' | grep -q '^thetenqiraaat-ci$'; then
              echo "Container exited before becoming healthy"
              docker logs thetenqiraaat-ci || true
              exit 1
            fi

            if curl -fsS http://127.0.0.1:7860/up | grep -q '^ok$'; then
              exit 0
            fi

            sleep 2
          done

          echo "Health check did not pass within timeout"
          docker logs thetenqiraaat-ci || true
          exit 1

      - name: Dump container logs on failure
        if: failure()
        run: docker logs thetenqiraaat-ci || true

      - name: Stop the container
        if: always()
        run: docker stop thetenqiraaat-ci || true