name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t thetenqiraaat-ci:latest .

      - name: Run container
        run: docker run -d --rm --name thetenqiraaat-ci -p 7860:7860 thetenqiraaat-ci:latest

      - name: Health check
        run: |
          sleep 15
          curl --fail --retry 10 --retry-connrefused --retry-delay 3 http://localhost:7860/

      - name: View container logs (on failure)
        if: failure()
        run: docker logs thetenqiraaat-ci