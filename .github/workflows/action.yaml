name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python app.py test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: thetenqiraaat-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start the container
        run: docker run -d --rm --name thetenqiraaat-ci -e PORT=7860 -p 7860:7860 thetenqiraaat-ci:latest

      - name: Wait for the health check
        run: |
          python - <<'PY'
          import time
          import urllib.request

          url = 'http://127.0.0.1:7860/up'
          last_error = None

          for _ in range(30):
              try:
                  with urllib.request.urlopen(url, timeout=2) as response:
                      body = response.read().decode().strip()
                      assert response.status == 200
                      assert body == 'ok'
                      break
              except Exception as exc:
                  last_error = exc
                  time.sleep(2)
          else:
              raise SystemExit(f'health check did not pass: {last_error}')
          PY

      - name: Stop the container
        if: always()
        run: docker stop thetenqiraaat-ci || true