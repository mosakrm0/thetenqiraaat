name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: App smoke test
        run: python -c "import app; assert app.app.test_client() is not None"

      - name: Build image
        run: docker build -t thetenqiraaat-ci:latest .

      - name: Run container
        run: docker run -d --rm --name thetenqiraaat-ci -e PORT=7860 -p 7860:7860 thetenqiraaat-ci:latest

      - name: Health check
        run: |
          if ! timeout 60 bash -c 'until curl -fsS http://127.0.0.1:7860/up | grep -q "^ok$"; do sleep 2; done'; then
            docker logs thetenqiraaat-ci || true
            exit 1
          fi

      - name: Stop container
        if: always()
        run: docker rm -f thetenqiraaat-ci || true