<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 | الصفحة غير موجودة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --gold: #c9a84c;
        --gold-lt: #e8cc7a;
        --bg: #060b16;
        --glass: rgba(10, 18, 38, 0.84);
        --border: rgba(201, 168, 76, 0.22);
        --txt: #f0e8d0;
        --txt2: #b3a486;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Cairo', sans-serif;
        background: radial-gradient(ellipse 85% 60% at 10% 5%, rgba(26, 107, 74, 0.16) 0%, transparent 60%),
                    radial-gradient(ellipse 60% 50% at 90% 90%, rgba(201, 168, 76, 0.12) 0%, transparent 60%),
                    var(--bg);
        color: var(--txt);
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .card {
        width: min(700px, 100%);
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.5);
        padding: 28px 22px;
        text-align: center;
      }

      .code {
        margin: 0;
        color: var(--gold);
        font-weight: 700;
        font-size: 0.9rem;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 10px 0 8px;
        font-family: 'Amiri', serif;
        color: var(--gold-lt);
        font-size: clamp(1.8rem, 4vw, 2.4rem);
      }

      p {
        margin: 0 auto;
        max-width: 52ch;
        color: var(--txt2);
        line-height: 1.9;
        font-size: 0.96rem;
      }

      .actions {
        margin-top: 22px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        color: var(--txt);
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 0.9rem;
        transition: border-color .2s ease, transform .2s ease;
      }

      .btn:hover {
        border-color: var(--gold);
        transform: translateY(-2px);
      }

      .hint {
        margin-top: 14px;
        color: var(--txt2);
        font-size: 0.82rem;
      }

      @media (max-width: 680px) {
        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="code">404</p>
      <h1>الصفحة غير موجودة</h1>
      <p>يبدو أن الرابط الذي فتحته غير صحيح أو أن الصفحة تم نقلها. يمكنك الرجوع مباشرة إلى أقسام المشروع من الأزرار التالية.</p>

      <div class="actions">
        <a class="btn" href="/index.html">الصفحة الرئيسية</a>
        <a class="btn" href="/readings">مقارنة القراءات</a>
        <a class="btn" href="/translations">مقارنة الترجمات</a>
      </div>

      <div class="hint">إذا استمرت المشكلة، راجع الرابط وحاول مرة أخرى.</div>
    </main>
  </body>
</html>
